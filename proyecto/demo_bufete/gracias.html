<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gracias por tu consulta</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(to bottom, #0A1A2F, #1B2C45, #E8EEF3);
      color: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .contenedor {
      background: rgba(10, 26, 47, 0.85);
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 0 25px rgba(0,0,0,0.5);
      max-width: 420px;
    }

    h1 {
      color: #f2d27a;
      margin-bottom: 15px;
    }

    p {
      opacity: 0.9;
      margin-bottom: 25px;
    }

    a {
      display: inline-block;
      padding: 12px 25px;
      background: #f2d27a;
      color: #0A1A2F;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
      transition: 0.3s;
    }

    a:hover {
      background: #d9b866;
    }
  </style>
</head>

<body>
  <div class="contenedor fade-in">
    <h1>¡Gracias por tu consulta!</h1>
    <p>Tu mensaje ha sido enviado correctamente.  
    Nuestro equipo legal se pondrá en contacto contigo lo antes posible.</p>

    <a href="index.html">Volver al inicio</a>
  </div>
</body>
</html>
